services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
      pull: false
    environment:
      WATCHOUT_TELEGRAM_SECRET_KEY: ${WATCHOUT_TELEGRAM_SECRET_KEY:-replace-with-a-long-random-secret}
      WATCHOUT_TELEGRAM_DEFAULT_ADMIN_USERNAME: ${WATCHOUT_TELEGRAM_DEFAULT_ADMIN_USERNAME:-admin}
      WATCHOUT_TELEGRAM_DEFAULT_ADMIN_PASSWORD: ${WATCHOUT_TELEGRAM_DEFAULT_ADMIN_PASSWORD:-admin123}
      WATCHOUT_TELEGRAM_DATABASE_URL: ${WATCHOUT_TELEGRAM_DATABASE_URL:-postgresql+psycopg://watchout:watchout_dev_password@postgres:5432/watchout_telegram}
      WATCHOUT_TELEGRAM_SESSION_DIR: ${WATCHOUT_TELEGRAM_SESSION_DIR:-./data/sessions}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-watchout_telegram}
      POSTGRES_USER: ${POSTGRES_USER:-watchout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchout_dev_password}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchout} -d ${POSTGRES_DB:-watchout_telegram}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    profiles:
      - clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./docs/clickhouse_telegram_messages.sql:/docker-entrypoint-initdb.d/001_telegram_messages.sql:ro
    environment:
      CLICKHOUSE_DB: watchout_telegram
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    restart: unless-stopped
