services:
  backend:
    build:
      context: ./backend
    container_name: watchout-telegram-backend
    env_file:
      - ./.env
    environment:
      WATCHOUT_TELEGRAM_DATABASE_URL: ${WATCHOUT_TELEGRAM_DATABASE_URL:-sqlite:///./data/app.db}
      WATCHOUT_TELEGRAM_SESSION_DIR: ${WATCHOUT_TELEGRAM_SESSION_DIR:-./data/sessions}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: watchout-telegram-frontend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://127.0.0.1:8000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: watchout-telegram-clickhouse
    profiles:
      - clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./docs/clickhouse_telegram_messages.sql:/docker-entrypoint-initdb.d/001_telegram_messages.sql:ro
    environment:
      CLICKHOUSE_DB: watchout_telegram
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    restart: unless-stopped
